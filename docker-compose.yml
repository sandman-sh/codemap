version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: codemapai-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: codemapai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codemapai-api
    restart: always
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgrespassword@postgres:5432/codemapai
      OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-openrouter/free}
    depends_on:
      - postgres

volumes:
  pgdata:
